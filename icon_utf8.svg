<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!--
    Minimal, theme-aware icon for Backdating Git.
    Uses currentColor so it tints correctly in the VS Code activity bar.
  -->
  <!-- Git-style node chain -->
  <circle cx="7" cy="7" r="1.6" fill="currentColor" opacity="0.95" />
  <circle cx="11" cy="12" r="1.6" fill="currentColor" opacity="0.95" />
  <circle cx="7" cy="17" r="1.6" fill="currentColor" opacity="0.95" />
  <path d="M7.7 8.1L10.3 10.9M10.3 13.1L7.7 15.9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>

  <!-- Clock circle -->
  <circle cx="16" cy="12" r="4.5" stroke="currentColor" stroke-width="1.4" fill="none" opacity="0.9"/>

  <!-- Clock hands -->
  <path d="M16 12V9.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M16 12L14.3 13.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>

  <!-- Back-arrow hint (subtle) -->
  <path d="M18.3 9.7C17.6 9.1 16.9 8.8 16 8.8C15.1 8.8 14.4 9.1 13.7 9.7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.75"/>
  <path d="M14.1 8.9L13.6 9.9L14.6 10.4" fill="currentColor" opacity="0.75"/>
</svg>
