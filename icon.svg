<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle gradient -->
  <rect width="512" height="512" rx="100" fill="#0D1117"/>
  <rect x="1" y="1" width="510" height="510" rx="99" stroke="#30363D" stroke-width="2"/>
  
  <!-- Outer Glow -->
  <circle cx="256" cy="256" r="180" fill="url(#paint0_radial)" fill-opacity="0.15"/>

  <!-- Git Branching Structure -->
  <path d="M180 360V152" stroke="#F8FAFC" stroke-width="24" stroke-linecap="round"/>
  <path d="M180 256C180 200 240 180 332 180" stroke="#F8FAFC" stroke-width="24" stroke-linecap="round"/>
  
  <!-- Nodes (Git Circles) -->
  <circle cx="180" cy="360" r="36" fill="#238636" stroke="#F8FAFC" stroke-width="12"/>
  <circle cx="180" cy="152" r="36" fill="#0D1117" stroke="#F8FAFC" stroke-width="12"/>
  
  <!-- Backdating Hub (Amber node with Clock indicator) -->
  <circle cx="332" cy="180" r="48" fill="#C5A028" stroke="#F8FAFC" stroke-width="12"/>
  
  <!-- Clock Hands inside the Amber node -->
  <path d="M332 180V155" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <path d="M332 180L350 190" stroke="white" stroke-width="6" stroke-linecap="round"/>
  
  <defs>
    <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(180)">
      <stop stop-color="#C5A028"/>
      <stop offset="1" stop-color="#C5A028" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
